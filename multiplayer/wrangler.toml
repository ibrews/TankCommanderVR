name = "tank-commander"
main = "worker.js"
compatibility_date = "2025-06-01"

# Durable Object relay. Free plan requires the SQLite storage backend, so the
# class is registered via new_sqlite_classes (not new_classes).
[[durable_objects.bindings]]
name = "ROOM"
class_name = "Room"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]

# KV namespace for uploaded headset logs / session data. `id` is filled in by
# `wrangler kv namespace create LOGS` (run once; paste the printed id here).
[[kv_namespaces]]
binding = "LOGS"
id = "fe6637b9033d40299eda04da7bb878c6"

# Token gating log READS (list/get). Uploads are open (low-stakes crash text
# from our own app). NOT stored here (this repo is public) -- set via
# `npx wrangler secret put LOG_TOKEN` from the multiplayer/ dir, one time per
# machine that deploys. Rotate the same way; env.LOG_TOKEN in worker.js reads
# secrets and [vars] identically, so no code change either way.
